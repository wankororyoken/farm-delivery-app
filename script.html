<script>
// ── GASサーバー関数をPromiseでラップ ─────────────────
function gasCall(fnName, arg) {
  return new Promise(function(resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(function(e) { reject(new Error(e.message || String(e))); });
    if (arg !== undefined) runner[fnName](arg);
    else runner[fnName]();
  });
}

// ── 定数 ─────────────────────────────────────────────
var COL = { DATE:0, PRODUCT:1, QTY:2, UNIT_PRICE:3, AMOUNT:4, BUSINESS:5, DESTINATION:6, ROW_NUM:7 };

// ── 状態 ─────────────────────────────────────────────
var productHistory = {};  // { "人参": [{date, unitPrice}] }
var businesses     = [];
var destinations   = [];

// 一覧・請求書用キャッシュ（月ごと）
var cachedRows  = [];
var cachedMonth = null;

// ── DOM参照 ──────────────────────────────────────────
function $(id) { return document.getElementById(id); }

var fDate        = $('f-date');
var fBusiness    = $('f-business');
var fDestination = $('f-destination');
var fProduct     = $('f-product');
var fQty         = $('f-qty');
var fPrice       = $('f-price');
var fAmount      = $('f-amount');
var btnSave      = $('btn-save');
var saveBar      = $('save-bar');
var saveStatus   = $('save-status');
var suggestions  = $('product-suggestions');
var loadingOverlay = $('loading-overlay');
var loadingMsg     = $('loading-msg');

// ── 起動 ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  setDefaultDate();
  setupNavigation();
  setupEntryForm();
  setupListView();
  setupInvoiceView();
  setupEditModal();
  loadMetadata();
});

function setDefaultDate() {
  fDate.value = new Date().toISOString().slice(0, 10);
}

// ── メタデータ読み込み（起動時、軽量） ────────────────
function loadMetadata() {
  showOverlay('選択肢を読み込んでいます…');
  gasCall('getMetadata').then(function(meta) {
    productHistory = meta.products || {};
    businesses     = meta.businesses   || [];
    destinations   = meta.destinations || [];
    buildDropdowns();
    hideOverlay();
  }).catch(function(e) {
    showOverlayError('読み込みエラー: ' + e.message);
  });
}

// ── ドロップダウン構築 ────────────────────────────────
function buildDropdowns() {
  populateSelect(fBusiness,        businesses,              getSaved('lastBusiness'));
  populateSelect(fDestination,     destinations,            getSaved('lastDestination'));
  populateSelect($('filter-dest'), [''].concat(destinations), '');
  populateSelect($('filter-biz'),  [''].concat(businesses),   '');
  populateSelect($('inv-dest'),    [''].concat(destinations), '');
}

function populateSelect(sel, values, selected) {
  if (!sel) return;
  var prev = sel.value || selected;
  sel.innerHTML = '';
  values.forEach(function(v) {
    var opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v || 'すべて';
    if (v === prev) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ── 月データ取得（キャッシュ付き） ───────────────────
function loadRowsForMonth(month) {
  if (cachedMonth === month && cachedRows.length) {
    return Promise.resolve(cachedRows);
  }
  return gasCall('getSheetData', month).then(function(rows) {
    cachedRows  = rows || [];
    cachedMonth = month;
    return cachedRows;
  });
}

// ── ナビゲーション ────────────────────────────────────
function setupNavigation() {
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('.view').forEach(function(v) { v.classList.add('hidden'); });
      $('view-' + btn.dataset.view).classList.remove('hidden');
      saveBar.style.display = btn.dataset.view === 'entry' ? '' : 'none';
      if (btn.dataset.view === 'list') refreshListView();
    });
  });
}

// ── 入力フォーム ─────────────────────────────────────
function setupEntryForm() {
  fProduct.addEventListener('focus', function() {
    // iOSはfocus時に自動スクロールするので独自scrollToは不要
  });
  fProduct.addEventListener('input', onProductInput);
  fProduct.addEventListener('keydown', onProductKeydown);
  fProduct.addEventListener('blur', function() {
    setTimeout(hideSuggestions, 300);
  });
  // キーボード表示に合わせてサジェスト位置を調整
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      if (!suggestions.classList.contains('hidden')) positionSuggestions();
    });
  }
  fQty.addEventListener('input', updateAmount);
  fPrice.addEventListener('input', updateAmount);

  // Enter キーで次フィールドへ / 最後のフィールドで保存
  [fProduct, fQty, fPrice].forEach(function(el, i) {
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !suggestions.classList.contains('hidden')) return;
      if (e.key === 'Enter') {
        e.preventDefault();
        if (i === 0) fQty.focus();
        else if (i === 1) fPrice.focus();
        else saveToSheet();
      }
    });
  });

  btnSave.addEventListener('click', saveToSheet);
  fBusiness.addEventListener('change', function()    { save('lastBusiness',    fBusiness.value); });
  fDestination.addEventListener('change', function() { save('lastDestination', fDestination.value); });
}

// ── 品名サジェスト ────────────────────────────────────
function onProductInput() {
  var query = fProduct.value.trim();
  if (!query) { hideSuggestions(); return; }

  var matched = Object.keys(productHistory).filter(function(name) {
    return name.indexOf(query) !== -1;
  }).sort();

  if (!matched.length) { hideSuggestions(); return; }

  suggestions.innerHTML = '';
  var header = document.createElement('li');
  header.className = 'sug-header';
  header.textContent = '履歴（最新単価を自動補完）';
  suggestions.appendChild(header);

  matched.forEach(function(name) {
    var history = productHistory[name];
    var latest  = history[history.length - 1];
    var li = document.createElement('li');
    li.innerHTML =
      '<span class="sug-name">' + esc(name) + '</span>' +
      '<span class="sug-meta">' +
        '<span class="sug-price">¥' + (latest.unitPrice||0).toLocaleString() + '</span>' +
        '<span class="sug-date">' + esc(String(latest.date||'')) + '</span>' +
      '</span>';
    // スクロールと選択を区別: 指が動いていなければ選択
    var touchStartY = 0;
    var touchMoved  = false;
    li.addEventListener('touchstart', function(e) {
      touchStartY = e.touches[0].clientY;
      touchMoved  = false;
    }, { passive: true });
    li.addEventListener('touchmove', function(e) {
      if (Math.abs(e.touches[0].clientY - touchStartY) > 6) touchMoved = true;
    }, { passive: true });
    li.addEventListener('touchend', function(e) {
      if (!touchMoved) {
        e.preventDefault();
        selectProduct(name, latest.unitPrice);
      }
    }, { passive: false });
    // マウス操作のフォールバック
    li.addEventListener('mousedown', function(e) {
      e.preventDefault();
      selectProduct(name, latest.unitPrice);
    });
    suggestions.appendChild(li);
  });
  suggestions.classList.remove('hidden');
  positionSuggestions();
}

// キーボードを考慮してサジェストを固定配置
function positionSuggestions() {
  var vv       = window.visualViewport;
  var vvHeight = vv ? vv.height : window.innerHeight;
  var rect     = fProduct.getBoundingClientRect();
  var spaceBelow = vvHeight - rect.bottom - 8;
  var spaceAbove = rect.top - 8;
  var leftPos  = rect.left;
  var rightPos = window.innerWidth - rect.right;

  suggestions.style.left  = leftPos  + 'px';
  suggestions.style.right = rightPos + 'px';
  suggestions.style.width = 'auto';

  if (spaceBelow < 180) {
    suggestions.style.top       = 'auto';
    suggestions.style.bottom    = (window.innerHeight - rect.top + 4) + 'px';
    suggestions.style.maxHeight = Math.min(spaceAbove - 4, 280) + 'px';
  } else {
    suggestions.style.top       = (rect.bottom + 4) + 'px';
    suggestions.style.bottom    = 'auto';
    suggestions.style.maxHeight = Math.min(spaceBelow, 280) + 'px';
  }
}

var focusedSugIdx = -1;
function onProductKeydown(e) {
  if (suggestions.classList.contains('hidden')) return;
  var items = Array.from(suggestions.querySelectorAll('li:not(.sug-header)'));
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedSugIdx = Math.min(focusedSugIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedSugIdx = Math.max(focusedSugIdx - 1, 0);
  } else if (e.key === 'Enter' && focusedSugIdx >= 0) {
    e.preventDefault();
    items[focusedSugIdx].dispatchEvent(new PointerEvent('pointerdown', { bubbles: true }));
    return;
  } else if (e.key === 'Escape') {
    hideSuggestions(); return;
  }
  items.forEach(function(li, i) { li.classList.toggle('focused', i === focusedSugIdx); });
}

function selectProduct(name, unitPrice) {
  fProduct.value = name;
  fPrice.value   = unitPrice || '';
  focusedSugIdx  = -1;
  hideSuggestions();
  updateAmount();
  fQty.focus();
}

function hideSuggestions() {
  suggestions.classList.add('hidden');
  focusedSugIdx = -1;
}

// ── 金額計算 ──────────────────────────────────────────
function updateAmount() {
  var qty    = parseFloat(fQty.value)   || 0;
  var price  = parseFloat(fPrice.value) || 0;
  var amount = qty * price;
  fAmount.textContent = amount > 0 ? '¥' + amount.toLocaleString() : '—';
}

// ── シートへ保存（1品目直接保存） ─────────────────────
function saveToSheet() {
  var product = fProduct.value.trim();
  var qty     = parseFloat(fQty.value);
  var price   = parseFloat(fPrice.value);

  if (!fDate.value)          { fDate.focus();    return; }
  if (!product)              { fProduct.focus(); return; }
  if (!qty   || qty   <= 0)  { fQty.focus();     return; }
  if (!price || price <= 0)  { fPrice.focus();   return; }

  var dateVal = formatDateJP(fDate.value);
  var biz     = fBusiness.value;
  var dest    = fDestination.value;
  var amount  = qty * price;

  btnSave.disabled = true;
  showStatus('保存中…', 'info');

  gasCall('appendRows', [[dateVal, product, qty, price, amount, biz, dest]])
    .then(function() {
      // 品名履歴をローカルに反映
      if (!productHistory[product]) productHistory[product] = [];
      productHistory[product].push({ date: dateVal, unitPrice: price });

      // 月キャッシュを無効化
      cachedMonth = null;

      // 品名・数量・単価・金額をクリア（日付・事業・納品先は保持）
      fProduct.value      = '';
      fQty.value          = '';
      fPrice.value        = '';
      fAmount.textContent = '—';

      btnSave.disabled = false;
      showStatus('保存しました: ' + product + '  ¥' + amount.toLocaleString(), 'success');
      setTimeout(function() { saveStatus.classList.add('hidden'); }, 4000);
      fProduct.focus();
    })
    .catch(function(e) {
      showStatus('保存に失敗しました: ' + e.message, 'error');
      btnSave.disabled = false;
    });
}

// ── 一覧ビュー ────────────────────────────────────────
function setupListView() {
  $('filter-month').value = new Date().toISOString().slice(0, 7);
  $('btn-reload').addEventListener('click', function() {
    cachedMonth = null; // キャッシュ破棄して強制再取得
    refreshListView();
  });
  $('filter-month').addEventListener('change', refreshListView);
  $('filter-dest').addEventListener('change', function() { renderListTable(cachedRows); });
  $('filter-biz').addEventListener('change',  function() { renderListTable(cachedRows); });
}

function refreshListView() {
  var month = $('filter-month').value;
  showStatus('読み込み中…', 'info');
  loadRowsForMonth(month).then(function(rows) {
    renderListTable(rows);
    saveStatus.classList.add('hidden');
  }).catch(function(e) { showStatus('エラー: ' + e.message, 'error'); });
}

function renderListTable(rows) {
  var dest = $('filter-dest').value;
  var biz  = $('filter-biz').value;

  var filtered = rows.filter(function(row) {
    return (!dest || String(row[COL.DESTINATION]||'') === dest)
        && (!biz  || String(row[COL.BUSINESS]   ||'') === biz);
  });

  var tbody = $('list-tbody');
  tbody.innerHTML = '';
  var total = 0;
  filtered.forEach(function(row) {
    var amount = parseFloat(row[COL.AMOUNT]) || 0;
    total += amount;
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + esc(String(row[COL.DATE]      ||'')) + '</td>' +
      '<td>' + esc(String(row[COL.PRODUCT]   ||'')) + '</td>' +
      '<td class="num">' + (row[COL.QTY]       ||'') + '</td>' +
      '<td class="num">' + (row[COL.UNIT_PRICE]||'') + '</td>' +
      '<td class="num">¥' + amount.toLocaleString() + '</td>' +
      '<td>' + esc(String(row[COL.BUSINESS]   ||'')) + '</td>' +
      '<td>' + esc(String(row[COL.DESTINATION]||'')) + '</td>' +
      '<td><button class="btn-edit-row">編集</button></td>';
    var editBtn = tr.querySelector('.btn-edit-row');
    (function(r) {
      editBtn.addEventListener('click', function() { openEditModal(r); });
    })(row);
    tbody.appendChild(tr);
  });
  $('list-summary').textContent = filtered.length + ' 件　合計: ¥' + total.toLocaleString();
}

// ── 編集モーダル ──────────────────────────────────────
var editingRowNum = null;

function setupEditModal() {
  $('btn-modal-close').addEventListener('click', closeEditModal);
  $('btn-edit-cancel').addEventListener('click', closeEditModal);
  $('btn-edit-save').addEventListener('click', saveEdit);
  $('btn-edit-delete').addEventListener('click', confirmDelete);
  $('edit-qty').addEventListener('input', updateEditAmount);
  $('edit-price').addEventListener('input', updateEditAmount);
  $('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });
}

function openEditModal(row) {
  editingRowNum = row[COL.ROW_NUM];

  $('edit-date').value        = dateJPToISO(String(row[COL.DATE]    || ''));
  $('edit-product').value     = String(row[COL.PRODUCT]    || '');
  $('edit-qty').value         = row[COL.QTY]        || '';
  $('edit-price').value       = row[COL.UNIT_PRICE]  || '';
  populateSelect($('edit-business'),     businesses,   String(row[COL.BUSINESS]    || ''));
  populateSelect($('edit-destination'),  destinations, String(row[COL.DESTINATION] || ''));

  updateEditAmount();
  $('edit-status').classList.add('hidden');
  $('btn-edit-save').disabled   = false;
  $('btn-edit-delete').disabled = false;
  $('edit-modal').classList.remove('hidden');
}

function closeEditModal() {
  $('edit-modal').classList.add('hidden');
  editingRowNum = null;
}

function updateEditAmount() {
  var qty    = parseFloat($('edit-qty').value)   || 0;
  var price  = parseFloat($('edit-price').value) || 0;
  var amount = qty * price;
  $('edit-amount').textContent = amount > 0 ? '¥' + amount.toLocaleString() : '—';
}

function saveEdit() {
  var dateISO = $('edit-date').value;
  var product = $('edit-product').value.trim();
  var qty     = parseFloat($('edit-qty').value);
  var price   = parseFloat($('edit-price').value);
  var biz     = $('edit-business').value;
  var dest    = $('edit-destination').value;

  if (!dateISO || !product || !qty || !price) {
    showEditStatus('日付・品名・数量・単価を入力してください。', 'error');
    return;
  }

  var amount  = qty * price;
  var rowData = [formatDateJP(dateISO), product, qty, price, amount, biz, dest];

  $('btn-edit-save').disabled = true;
  showEditStatus('保存中…', 'info');

  gasCall('updateRow', { rowNum: editingRowNum, rowData: rowData })
    .then(function() {
      showEditStatus('保存しました。', 'success');
      cachedMonth = null;
      setTimeout(function() {
        closeEditModal();
        refreshListView();
      }, 700);
    })
    .catch(function(e) {
      showEditStatus('保存に失敗しました: ' + e.message, 'error');
      $('btn-edit-save').disabled = false;
    });
}

function confirmDelete() {
  var product = $('edit-product').value || 'この行';
  if (!confirm('「' + product + '」を削除しますか？\nこの操作は元に戻せません。')) return;

  $('btn-edit-delete').disabled = true;
  $('btn-edit-save').disabled   = true;
  showEditStatus('削除中…', 'info');

  gasCall('deleteRow', editingRowNum)
    .then(function() {
      showEditStatus('削除しました。', 'success');
      cachedMonth = null;
      setTimeout(function() {
        closeEditModal();
        refreshListView();
      }, 700);
    })
    .catch(function(e) {
      showEditStatus('削除に失敗しました: ' + e.message, 'error');
      $('btn-edit-delete').disabled = false;
      $('btn-edit-save').disabled   = false;
    });
}

function showEditStatus(msg, type) {
  var el = $('edit-status');
  el.textContent = msg;
  el.className   = 'save-status ' + type;
  el.classList.remove('hidden');
}

// "2026年4月18日" → "2026-04-18"
function dateJPToISO(str) {
  var m = str.match(/(\d{4})年(\d+)月(\d+)日/);
  if (m) return m[1] + '-' + ('0'+m[2]).slice(-2) + '-' + ('0'+m[3]).slice(-2);
  var s = str.match(/(\d{4})\/(\d+)\/(\d+)/);
  if (s) return s[1] + '-' + ('0'+s[2]).slice(-2) + '-' + ('0'+s[3]).slice(-2);
  return str;
}

// ── 請求書ビュー ──────────────────────────────────────
function setupInvoiceView() {
  $('inv-month').value = new Date().toISOString().slice(0, 7);
  $('btn-gen-invoice').addEventListener('click', generateInvoice);
  $('btn-print').addEventListener('click', function() { window.print(); });
  $('btn-export-xlsx').addEventListener('click', exportXlsx);

  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.add('hidden'); });
      $('tab-' + btn.dataset.tab).classList.remove('hidden');
    });
  });
}

function generateInvoice() {
  var month = $('inv-month').value;
  var dest  = $('inv-dest').value;
  $('invoice-preview').innerHTML = '<p class="invoice-placeholder">読み込み中…</p>';

  loadRowsForMonth(month).then(function(rows) {
    renderInvoice($('invoice-preview'), rows, dest, month);
    renderSummary($('summary-tbody'), $('summary-grand-total'), rows, month);
    $('summary-title').textContent = '月次サマリー（' + formatMonthJP(month) + '）';
  }).catch(function(e) {
    $('invoice-preview').innerHTML = '<p class="invoice-placeholder">エラー: ' + esc(e.message) + '</p>';
  });
}

function exportXlsx() {
  var month = $('inv-month').value;
  var dest  = $('inv-dest').value;
  loadRowsForMonth(month).then(function(rows) {
    exportInvoiceXlsx(rows, dest, month);
  });
}

// ── 請求書描画 ────────────────────────────────────────
function renderInvoice(container, monthRows, destination, ym) {
  var filtered = destination
    ? monthRows.filter(function(r) { return String(r[COL.DESTINATION]||'') === destination; })
    : monthRows;

  if (!filtered.length) {
    container.innerHTML = '<p class="invoice-placeholder">対象データがありません。</p>';
    return;
  }

  var total = filtered.reduce(function(s, r) { return s + (parseFloat(r[COL.AMOUNT])||0); }, 0);
  var destLabel = destination || '（全納品先）';

  var rows = filtered.map(function(r) {
    return '<tr>' +
      '<td>' + esc(String(r[COL.DATE]||'')) + '</td>' +
      '<td>' + esc(String(r[COL.PRODUCT]||'')) + '</td>' +
      '<td class="num">' + (r[COL.QTY]||'') + '</td>' +
      '<td class="num">¥' + (parseFloat(r[COL.UNIT_PRICE])||0).toLocaleString() + '</td>' +
      '<td class="num">¥' + (parseFloat(r[COL.AMOUNT])||0).toLocaleString() + '</td>' +
      '</tr>';
  }).join('');

  container.innerHTML =
    '<div class="invoice-doc" id="invoice-content">' +
      '<h2>御 請 求 書</h2>' +
      '<div class="invoice-meta">' +
        '<div>' +
          '<div class="invoice-to">' + esc(destLabel) + ' 御中</div>' +
          '<div style="font-size:12px;color:#6b7280;margin-top:4px">下記の通りご請求申し上げます。</div>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<div style="color:#6b7280">' + formatMonthJP(ym) + '分</div>' +
          '<div class="invoice-grand">合計 ¥' + total.toLocaleString() + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="table-wrap">' +
        '<table class="data-table">' +
          '<thead><tr><th>日付</th><th>品名</th><th class="num">数量</th><th class="num">単価</th><th class="num">金額</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
          '<tfoot><tr style="font-weight:700;background:#e8f5ee">' +
            '<td colspan="4" style="text-align:right;padding:8px 10px">合計</td>' +
            '<td class="num" style="padding:8px 10px">¥' + total.toLocaleString() + '</td>' +
          '</tr></tfoot>' +
        '</table>' +
      '</div>' +
    '</div>';
}

// ── 月次サマリー描画 ──────────────────────────────────
function renderSummary(tbody, totalEl, monthRows, ym) {
  var groups = {};
  monthRows.forEach(function(r) {
    var biz    = String(r[COL.BUSINESS]   ||'（不明）');
    var dest   = String(r[COL.DESTINATION]||'（不明）');
    var key    = biz + '\t' + dest;
    groups[key] = (groups[key] || 0) + (parseFloat(r[COL.AMOUNT]) || 0);
  });

  tbody.innerHTML = '';
  var grand = 0;
  var entries = Object.keys(groups).sort();
  entries.forEach(function(key) {
    var amount = groups[key];
    var parts  = key.split('\t');
    grand += amount;
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + esc(parts[0]) + '</td>' +
      '<td>' + esc(parts[1]) + '</td>' +
      '<td class="num">¥' + amount.toLocaleString() + '</td>';
    tbody.appendChild(tr);
  });
  totalEl.textContent = '合計: ¥' + grand.toLocaleString() + '（' + formatMonthJP(ym) + '・' + entries.length + ' 区分）';
}

// ── Excel出力 ─────────────────────────────────────────
function exportInvoiceXlsx(monthRows, destination, ym) {
  var filtered = destination
    ? monthRows.filter(function(r) { return String(r[COL.DESTINATION]||'') === destination; })
    : monthRows;

  if (!filtered.length) { alert('対象データがありません。'); return; }

  var destLabel = destination || '全納品先';
  var total = filtered.reduce(function(s, r) { return s + (parseFloat(r[COL.AMOUNT])||0); }, 0);

  var invoiceData = [
    ['御請求書'],
    [destLabel + ' 御中', '', '', '', formatMonthJP(ym) + '分'],
    [],
    ['日付', '品名', '数量', '単価', '金額'],
  ].concat(filtered.map(function(r) {
    return [String(r[COL.DATE]||''), String(r[COL.PRODUCT]||''),
            parseFloat(r[COL.QTY])||0, parseFloat(r[COL.UNIT_PRICE])||0, parseFloat(r[COL.AMOUNT])||0];
  })).concat([[], ['', '', '', '合計', total]]);

  var groups = {};
  monthRows.forEach(function(r) {
    var key = String(r[COL.BUSINESS]||'不明') + '\t' + String(r[COL.DESTINATION]||'不明');
    groups[key] = (groups[key] || 0) + (parseFloat(r[COL.AMOUNT]) || 0);
  });
  var summaryData = [['月次サマリー ' + formatMonthJP(ym)], ['事業', '納品先', '金額合計']]
    .concat(Object.keys(groups).sort().map(function(key) {
      var p = key.split('\t');
      return [p[0], p[1], groups[key]];
    }));

  var wb = XLSX.utils.book_new();
  var wsInv = XLSX.utils.aoa_to_sheet(invoiceData);
  wsInv['!cols'] = [{wch:14},{wch:20},{wch:8},{wch:10},{wch:12}];
  wsInv['!merges'] = [{ s:{r:0,c:0}, e:{r:0,c:4} }];
  XLSX.utils.book_append_sheet(wb, wsInv, '請求書_' + destLabel);
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryData), '月次サマリー');
  XLSX.writeFile(wb, '請求書_' + destLabel + '_' + ym + '.xlsx');
}

  loadingOverlay.classList.remove('hidden');

}

// ── ユーティリティ ────────────────────────────────────
function formatDateJP(isoDate) {
  if (!isoDate) return '';
  var d = new Date(isoDate + 'T00:00:00');
  return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
}

function formatMonthJP(ym) {
  if (!ym) return '';
  var p = ym.split('-');
  return p[0] + '年' + parseInt(p[1]) + '月';
}

function extractYearMonth(str) {
  str = String(str || '');
  var jpFull = str.match(/(\d{4})年(\d+)月/);
  if (jpFull) return { year: parseInt(jpFull[1]), month: parseInt(jpFull[2]) };
  var slash  = str.match(/^(\d{4})\/(\d+)\//);
  if (slash)  return { year: parseInt(slash[1]),  month: parseInt(slash[2]) };
  var iso    = str.match(/^(\d{4})-(\d{2})-/);
  if (iso)    return { year: parseInt(iso[1]),    month: parseInt(iso[2]) };
  var jp     = str.match(/^(\d+)月/);
  if (jp)     return { year: null, month: parseInt(jp[1]) };
  return { year: null, month: -1 };
}

function showStatus(msg, type) {
  saveStatus.textContent = msg;
  saveStatus.className   = 'save-status ' + type;
  saveStatus.classList.remove('hidden');
}

function save(key, val)  { try { localStorage.setItem('fda_' + key, val); } catch(e){} }
function getSaved(key)   { try { return localStorage.getItem('fda_' + key) || ''; } catch(e){ return ''; } }

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
